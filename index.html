<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Blog preview card</title>
</head>

<body>
  <main>
    <section class="container">
      <img class="card-img" src="./assets/images/illustration-article.svg" alt="illustration-article">
      <div class="card-content">
        <h5 class="category">Learning</h5>
        <h5 class="publish-date">Published 21 Dec 2023</h5>
        <h2 class="title">HTML & CSS foundations</h2>
        <p class="descripotion">
          These languages are the backbone of every website, defining
          structure, content and presentation.
        </p>
      </div>
      <div class="author">
        <img class="author-img " src="./assets/images/image-avatar.webp" alt="author-image" />
        <h5 class="author-name">Greg Hooper</h5>
      </div>
    </section>
  </main>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Francis Ojiako</a>.
  </div>
</body>

</html>
